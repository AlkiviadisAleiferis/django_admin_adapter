{% load i18n %}
<!-- All filters appear initially with display: none -->
<!-- using js in change_list to appear filters based on cookies -->
<div class="col-12 col-md-3 col-xl-2 d-flex flex-column justify-content-center align-items-start filter-container-div py-2" id="{{ field_name }}_container" style="display: none !important;">
    <p><b>{{ title }}</b></p>
    <select name="{{ field_name }}" class="form-control mx-auto custom-autocomplete-filter"
    style="width: 100%;" tabindex="-1" ajax_url="{{ spec.list_url }}"
    aria-hidden="true" id="{{ field_name }}_filter" data-name="{{ field_name }}" filter-title="{{ title }}" {% if spec.disabled_by_default %}disabled_by_default{% endif %}
    ajax_placeholder="{{ spec.filter_placeholder }}">

        <option value="">{{ title }}</option>
        <option value=""> - </option>

        {% for choice in choices %}
        {% if choice.name %}
        <option data-name="{{ choice.name }}" value="{{ choice.value }}" {% if choice.selected %}selected {% endif %}>
            {{ choice.display }}
        </option>
        {% endif %}
        {% endfor %}
    </select>
</div>
